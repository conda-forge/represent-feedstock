{% set name = "Represent" %}
{% set version = "2.1" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0b2d015c14e7ba6b3b5e6a7ba131a952013fe944339ac538764ce728a75dbcac

build:
  number: 1
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - represent
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/RazerM/represent
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Create __repr__ automatically or declaratively.' 

  description: |
    Create __repr__ automatically or declaratively.
  doc_url: https://github.com/RazerM/represent
  dev_url: https://github.com/RazerM/represent

extra:
  recipe-maintainers:
    - simonvh
    - zxdawn
